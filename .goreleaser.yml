version: 2

project_name: switchboard

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/server
    binary: switchboard
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: daltoniam
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/daltoniam/switchboard"
    description: "Unified MCP server aggregating 17+ integrations (GitHub, Datadog, Linear, Slack, AWS, GCP, and more) behind a single endpoint"
    license: "MIT"
    test: |
      system "#{bin}/switchboard", "--help"

homebrew_casks:
  - repository:
      owner: daltoniam
      name: homebrew-tap
    directory: Casks
    homepage: "https://github.com/daltoniam/switchboard"
    description: "Unified MCP server aggregating 17+ integrations (GitHub, Datadog, Linear, Slack, AWS, GCP, and more) behind a single endpoint"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/switchboard"]
          end
    caveats: |
      To start the background daemon, run:
        switchboard daemon install

      To uninstall the daemon before removing the cask, run:
        switchboard daemon uninstall

scoops:
  - repository:
      owner: daltoniam
      name: scoop-bucket
    homepage: "https://github.com/daltoniam/switchboard"
    description: "Unified MCP server aggregating 17+ integrations (GitHub, Datadog, Linear, Slack, AWS, GCP, and more) behind a single endpoint"
    license: "MIT"

nfpms:
  - package_name: switchboard
    homepage: "https://github.com/daltoniam/switchboard"
    description: "Unified MCP server aggregating 17+ integrations (GitHub, Datadog, Linear, Slack, AWS, GCP, and more) behind a single endpoint"
    maintainer: "Austin Cherry <austin@daltoniam.com>"
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    bindir: /usr/bin
    contents:
      - src: packaging/switchboard.service
        dst: /usr/share/switchboard/switchboard.service
        type: config
    scripts:
      postinstall: scripts/postinstall.sh
      preremove: scripts/preremove.sh

dockers:
  - image_templates:
      - "ghcr.io/daltoniam/switchboard:{{ .Version }}-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
  - image_templates:
      - "ghcr.io/daltoniam/switchboard:{{ .Version }}-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/daltoniam/switchboard:{{ .Version }}"
    image_templates:
      - "ghcr.io/daltoniam/switchboard:{{ .Version }}-amd64"
      - "ghcr.io/daltoniam/switchboard:{{ .Version }}-arm64"
  - name_template: "ghcr.io/daltoniam/switchboard:latest"
    image_templates:
      - "ghcr.io/daltoniam/switchboard:{{ .Version }}-amd64"
      - "ghcr.io/daltoniam/switchboard:{{ .Version }}-arm64"

release:
  github:
    owner: daltoniam
    name: switchboard
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
