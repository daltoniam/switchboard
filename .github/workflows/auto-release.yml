name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  auto-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Get PR labels
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          PR_NUMBER=$(gh pr list --state merged --search "${{ github.sha }}" --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(echo "$COMMIT_MSG" | grep -oP '\(#\K[0-9]+(?=\))' | head -1)
          fi

          if [ -n "$PR_NUMBER" ]; then
            LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
            echo "labels<<EOF" >> "$GITHUB_OUTPUT"
            echo "$LABELS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "Found PR #$PR_NUMBER with labels: $LABELS"
          else
            echo "labels=" >> "$GITHUB_OUTPUT"
            echo "No PR found for commit, proceeding with calver tag"
          fi

      - name: Check for skip label
        id: skip
        env:
          LABELS: ${{ steps.pr.outputs.labels }}
        run: |
          if echo "$LABELS" | grep -q "release:skip"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping release (release:skip label)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute calver tag
        id: version
        if: steps.skip.outputs.skip != 'true'
        run: |
          # Build semver-compatible calver: vYYYY.MMDD.N
          # e.g. v2026.422.0, v2026.422.1, ...
          YEAR=$(date -u +%Y)
          # Strip leading zeros for semver compliance
          MONTH=$(date -u +%-m)
          DAY=$(date -u +%-d)
          MMDD=$((MONTH * 100 + DAY))
          PREFIX="v${YEAR}.${MMDD}"

          EXISTING=$(git tag -l "${PREFIX}.*" --sort=-v:refname | head -1)
          if [ -z "$EXISTING" ]; then
            NEXT="${PREFIX}.0"
          else
            # Extract the .N patch suffix
            N="${EXISTING##*.}"
            NEXT="${PREFIX}.$((N + 1))"
          fi

          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Calver tag: $NEXT"

      - name: Create and push tag
        if: steps.skip.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.next }}" -m "Release ${{ steps.version.outputs.next }}"
          git push origin "${{ steps.version.outputs.next }}"
          echo "Tagged ${{ steps.version.outputs.next }} — release workflow will take it from here"
