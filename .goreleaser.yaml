version: 2

project_name: switchboard

builds:
  - main: ./cmd/server
    binary: switchboard
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/daltoniam/switchboard/version.Version={{.Version}}
      - -X github.com/daltoniam/switchboard/version.Commit={{.ShortCommit}}
      - -X github.com/daltoniam/switchboard/version.Date={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
