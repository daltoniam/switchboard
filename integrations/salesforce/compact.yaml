# Switchboard compaction specs for the salesforce integration.
#
# Schema: tools.<tool_name>: { spec: [<spec_lines>], max_bytes?: <int> }
#
# The `spec` array is a WHITELIST: only fields whose paths are listed survive
# compaction; everything else is stripped from the response. Within a kept
# parent, use `-field` or `-*_pattern` for explicit exclusions (the only
# blacklist-style escape hatch).
#
# Override at runtime: set $SWITCHBOARD_COMPACT_DIR=/path; place
# salesforce.yaml there with only the tools you want to change. Per-tool merge
# replaces embedded values; omitted tools fall through to these defaults.
#
# Full spec syntax (paths, arrays, aliases, exclusions): docs/field-compaction.md.

version: 1
tools:
    salesforce_describe_global:
        spec:
            - sobjects[].name
            - sobjects[].label
            - sobjects[].keyPrefix
            - sobjects[].queryable
            - sobjects[].createable
            - sobjects[].updateable
            - sobjects[].deletable
            - sobjects[].custom
    salesforce_describe_sobject:
        spec:
            - name
            - label
            - keyPrefix
            - queryable
            - createable
            - updateable
            - deletable
            - fields[].name
            - fields[].label
            - fields[].type
            - fields[].length
            - fields[].nillable
            - fields[].updateable
            - fields[].createable
            - childRelationships[].childSObject
            - childRelationships[].field
            - childRelationships[].relationshipName
    salesforce_get_limits:
        spec: []
    salesforce_list_api_versions:
        spec:
            - '[].version'
            - '[].label'
            - '[].url'
    salesforce_list_recently_viewed:
        spec:
            - '[].attributes.type'
            - '[].Id'
            - '[].Name'
