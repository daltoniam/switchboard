# Switchboard compaction specs for the gmeet (Google Meet REST API v2)
# integration.
#
# Schema: tools.<tool_name>: { spec: [<spec_lines>], max_bytes?: <int> }
#
# Meet API responses are relatively lean compared to other Google APIs, but
# participant / transcript entry lists can grow large for hour-long calls
# with dozens of attendees. The compaction specs below keep the high-signal
# fields (identity, timing, destinations) and drop deprecated camelCase
# duplicates plus per-resource etag bookkeeping when unused.
#
# Override at runtime: set $SWITCHBOARD_COMPACT_DIR=/path; place gmeet.yaml
# there with only the tools you want to change.
#
# Full spec syntax (paths, arrays, aliases, exclusions, wildcards):
# docs/field-compaction.md.

version: 1
tools:
    # ── Spaces ──────────────────────────────────────────────────────
    gmeet_create_space:
        views:
            space:
                spec:
                    - name
                    - meetingUri
                    - meetingCode
                    - config.accessType
                    - config.entryPointAccess
                    - config.moderation
                    - activeConference.conferenceRecord
                hint: "Created space: name, meeting URI/code, config."
                formats: [json, markdown]
        default:
            view: space
            format: json
    gmeet_get_space:
        views:
            space:
                spec:
                    - name
                    - meetingUri
                    - meetingCode
                    - config.accessType
                    - config.entryPointAccess
                    - config.moderation
                    - config.moderationRestrictions.chatRestriction
                    - config.moderationRestrictions.reactionRestriction
                    - config.moderationRestrictions.presentRestriction
                    - config.moderationRestrictions.defaultJoinAsViewerType
                    - activeConference.conferenceRecord
                hint: "Space details: name, meeting URI/code, config, active conference."
                formats: [json, markdown]
        default:
            view: space
            format: json
    gmeet_update_space:
        views:
            space:
                spec:
                    - name
                    - meetingUri
                    - meetingCode
                    - config.accessType
                    - config.entryPointAccess
                    - config.moderation
                    - activeConference.conferenceRecord
                hint: "Updated space with new config."
                formats: [json, markdown]
        default:
            view: space
            format: json
    gmeet_end_active_conference:
        spec:
            - status
    gmeet_list_conference_records:
        views:
            records:
                spec:
                    - conferenceRecords[].name
                    - conferenceRecords[].startTime
                    - conferenceRecords[].endTime
                    - conferenceRecords[].expireTime
                    - conferenceRecords[].space
                    - nextPageToken
                hint: "Conference records with space ref and times."
                formats: [json, markdown]
                max_bytes: 200000
        default:
            view: records
            format: json
    gmeet_get_conference_record:
        views:
            record:
                spec:
                    - name
                    - startTime
                    - endTime
                    - expireTime
                    - space
                hint: "Conference record: space ref, start/end times."
                formats: [json, markdown]
        default:
            view: record
            format: json
    gmeet_list_participants:
        views:
            participants:
                spec:
                    - participants[].name
                    - participants[].earliestStartTime
                    - participants[].latestEndTime
                    - participants[].signedinUser.user
                    - participants[].signedinUser.displayName
                    - participants[].anonymousUser.displayName
                    - participants[].phoneUser.displayName
                    - nextPageToken
                    - totalSize
                hint: "Participants with identity, type, and earliest/latest times."
                formats: [json, markdown]
                max_bytes: 200000
        default:
            view: participants
            format: json
    gmeet_list_recordings:
        views:
            recordings:
                spec:
                    - recordings[].name
                    - recordings[].state
                    - recordings[].startTime
                    - recordings[].endTime
                    - recordings[].driveDestination.file
                    - recordings[].driveDestination.exportUri
                    - nextPageToken
                hint: "Recordings with state, drive id, and times."
                formats: [json, markdown]
        default:
            view: recordings
            format: json
    gmeet_list_transcripts:
        views:
            transcripts:
                spec:
                    - transcripts[].name
                    - transcripts[].state
                    - transcripts[].startTime
                    - transcripts[].endTime
                    - transcripts[].docsDestination.document
                    - transcripts[].docsDestination.exportUri
                    - nextPageToken
                hint: "Transcripts with state, drive doc, and times."
                formats: [json, markdown]
        default:
            view: transcripts
            format: json
    gmeet_list_transcript_entries:
        views:
            entries:
                spec:
                    - transcriptEntries[].name
                    - transcriptEntries[].participant
                    - transcriptEntries[].text
                    - transcriptEntries[].languageCode
                    - transcriptEntries[].startTime
                    - transcriptEntries[].endTime
                    - nextPageToken
                hint: "Transcript entries with participant, text, language, and times."
                formats: [json, markdown]
                max_bytes: 200000
        default:
            view: entries
            format: json
