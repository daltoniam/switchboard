# Switchboard compaction specs for the gslides (Google Slides) integration.
#
# Schema: tools.<tool_name>: { spec: [<spec_lines>], max_bytes?: <int> }
#
# Note: gslides_create_presentation and gslides_batch_update either echo a
# small confirmation envelope or return the full presentation after a
# structural change. We declare specs only for the read-heavy tools:
# `gslides_get_presentation` (entire deck, masters, and all page
# elements) and `gslides_get_page` (single slide).
#
# Override at runtime: set $SWITCHBOARD_COMPACT_DIR=/path; place
# gslides.yaml there with only the tools you want to change.
#
# Full spec syntax (paths, arrays, aliases, exclusions): docs/field-compaction.md.

version: 1
tools:
    gslides_get_presentation:
        views:
            presentation:
                spec:
                    - presentationId
                    - title
                    - revisionId
                    - locale
                    - pageSize
                    - slides[].objectId
                    - slides[].pageType
                    - slides[].slideProperties.layoutObjectId
                    - slides[].slideProperties.masterObjectId
                    - slides[].slideProperties.notesPage.notesProperties
                    - slides[].pageElements[].objectId
                    - slides[].pageElements[].size
                    - slides[].pageElements[].transform
                    - slides[].pageElements[].title
                    - slides[].pageElements[].description
                    - slides[].pageElements[].shape.shapeType
                    - slides[].pageElements[].shape.placeholder
                    - slides[].pageElements[].shape.text.textElements[].textRun.content
                    - slides[].pageElements[].shape.text.textElements[].textRun.style.link
                    - slides[].pageElements[].shape.text.textElements[].paragraphMarker.style
                    - slides[].pageElements[].shape.text.textElements[].paragraphMarker.bullet
                    - slides[].pageElements[].image.contentUrl
                    - slides[].pageElements[].image.sourceUrl
                    - slides[].pageElements[].table.rows
                    - slides[].pageElements[].table.columns
                    - slides[].pageElements[].table.tableRows[].tableCells[].text.textElements[].textRun.content
                    - slides[].pageElements[].video.url
                    - slides[].pageElements[].video.source
                    - slides[].pageElements[].sheetsChart.spreadsheetId
                    - slides[].pageElements[].sheetsChart.chartId
                    - slides[].pageElements[].sheetsChart.contentUrl
                    - slides[].pageElements[].elementGroup.children[].objectId
                    - slides[].pageElements[].wordArt.renderedText
                    - slides[].pageElements[].line.lineType
                hint: "Presentation metadata, slide list, and page sizes."
                formats: [json, markdown]
                max_bytes: 300000
        default:
            view: presentation
            format: json
    gslides_get_page:
        views:
            page:
                spec:
                    - objectId
                    - pageType
                    - revisionId
                    - slideProperties.layoutObjectId
                    - slideProperties.masterObjectId
                    - pageElements[].objectId
                    - pageElements[].size
                    - pageElements[].transform
                    - pageElements[].title
                    - pageElements[].description
                    - pageElements[].shape.shapeType
                    - pageElements[].shape.placeholder
                    - pageElements[].shape.text.textElements[].textRun.content
                    - pageElements[].shape.text.textElements[].textRun.style.link
                    - pageElements[].shape.text.textElements[].paragraphMarker.style
                    - pageElements[].shape.text.textElements[].paragraphMarker.bullet
                    - pageElements[].image.contentUrl
                    - pageElements[].image.sourceUrl
                    - pageElements[].table.rows
                    - pageElements[].table.columns
                    - pageElements[].table.tableRows[].tableCells[].text.textElements[].textRun.content
                    - pageElements[].video.url
                    - pageElements[].sheetsChart.spreadsheetId
                    - pageElements[].sheetsChart.chartId
                    - pageElements[].wordArt.renderedText
                hint: "Single slide page with elements and layout."
                formats: [json, markdown]
        default:
            view: page
            format: json
