version: 1
tools:
  gdrive_list_files:
    description: "Search and list files and folders in Drive. Start here for finding documents, photos, folders, or anything else by name, owner, or type. Uses Drive's expressive query syntax (e.g. \"name contains 'budget'\", \"mimeType='application/vnd.google-apps.folder'\")."
    parameters:
      q:
        description: "Drive search query (e.g. \"name contains 'report'\", \"'<folder_id>' in parents\", \"mimeType='application/vnd.google-apps.document'\", \"trashed=false\"). See https://developers.google.com/drive/api/guides/search-files"
      page_size:
        description: "Max results per page (default 100, max 1000)"
      page_token:
        description: "Token for next page"
      order_by:
        description: "Comma-separated sort keys with optional 'desc' suffix: createdTime, folder, modifiedByMeTime, modifiedTime, name, name_natural, quotaBytesUsed, recency, sharedWithMeTime, starred, viewedByMeTime"
      fields:
        description: "Selector for response fields (e.g. 'nextPageToken,files(id,name,mimeType,parents)'). Defaults to a useful subset"
      corpora:
        description: "Bodies of items to query: user, drive, allDrives, domain"
      drive_id:
        description: "ID of the shared drive to search (required when corpora=drive)"
      include_items_from_all_drives:
        description: "Include items from shared drives (true/false, requires supports_all_drives=true)"
      spaces:
        description: "Comma-separated spaces: drive, appDataFolder"
      supports_all_drives:
        description: "true/false (default true)"
  gdrive_get_file:
    description: "Get metadata for a single file or folder (name, mimeType, size, parents, modifiedTime, owners, permissions, etc.). Use this for everything except the file content itself — for content use gdrive_download_file or gdrive_export_file."
    parameters:
      file_id:
        description: "File or folder ID"
        required: true
      fields:
        description: "Field selector (default '*' returns all). Example: 'id,name,mimeType,parents,size,modifiedTime'"
      supports_all_drives:
        description: "true/false (default true)"
  gdrive_download_file:
    description: "Download the binary content of a non-Google file (PDFs, images, ZIPs, CSV, etc.). For Google Docs/Sheets/Slides use gdrive_export_file. Response is a JSON envelope with base64-encoded content plus content_type, or text content inline when content_type is text/*."
    parameters:
      file_id:
        description: "File ID"
        required: true
      acknowledge_abuse:
        description: "Set to true to download a file flagged as malicious"
      supports_all_drives:
        description: "true/false (default true)"
      max_bytes:
        description: "Cap downloaded bytes (default 5_000_000, hard max 10_000_000)"
  gdrive_export_file:
    description: "Export a Google Docs Editors file (Docs, Sheets, Slides, Drawings) as a different MIME type. Common export types: 'application/pdf', 'text/plain', 'text/csv', 'text/markdown' (for Docs), 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' (.docx). Response is a JSON envelope with content_type plus either base64 content or inline text when content_type is text/*."
    parameters:
      file_id:
        description: "Google Docs/Sheets/Slides/Drawings file ID"
        required: true
      mime_type:
        description: "Target MIME type to export as"
        required: true
      max_bytes:
        description: "Cap exported bytes (default 5_000_000, hard max 10_000_000)"
  gdrive_create_file:
    description: "Create a new file or upload content. Two modes: (1) metadata-only — pass name/mime_type/parents; (2) with content — pass content (UTF-8 string) or content_base64 (binary). Use gdrive_create_folder for folders specifically."
    parameters:
      name:
        description: "File name"
        required: true
      mime_type:
        description: "MIME type (e.g. 'text/plain', 'application/pdf', 'application/vnd.google-apps.document' to create a new Google Doc from plain text content)"
      parents:
        description: "Comma-separated parent folder IDs (omit for My Drive root)"
      description:
        description: "File description"
      content:
        description: "Text content (mutually exclusive with content_base64)"
      content_base64:
        description: "Base64-encoded binary content (mutually exclusive with content)"
      starred:
        description: "true/false"
      app_properties:
        description: "JSON object string for appProperties"
      properties:
        description: "JSON object string for properties"
      body:
        description: "Raw JSON file metadata body — overrides convenience args except content/content_base64"
      supports_all_drives:
        description: "true/false (default true)"
  gdrive_update_file:
    description: "Update an existing file's metadata and/or content. To rename, change parents, or update content. Use gdrive_trash_file for soft delete."
    parameters:
      file_id:
        description: "File ID"
        required: true
      name:
        description: "New name"
      mime_type:
        description: "New MIME type"
      description:
        description: "New description"
      starred:
        description: "true/false"
      trashed:
        description: "true/false (prefer gdrive_trash_file)"
      add_parents:
        description: "Comma-separated parent IDs to add"
      remove_parents:
        description: "Comma-separated parent IDs to remove"
      content:
        description: "Text content to overwrite the file with"
      content_base64:
        description: "Base64-encoded binary content to overwrite the file with"
      body:
        description: "Raw JSON file metadata body — overrides convenience args"
      supports_all_drives:
        description: "true/false (default true)"
  gdrive_copy_file:
    description: "Copy a file to a new file (metadata + content). Note: cannot copy folders (use gdrive_list_files + repeated copies)."
    parameters:
      file_id:
        description: "Source file ID"
        required: true
      name:
        description: "New file name (defaults to 'Copy of <original>')"
      parents:
        description: "Comma-separated parent folder IDs"
      description:
        description: "New description"
      body:
        description: "Raw JSON metadata body — overrides convenience args"
      supports_all_drives:
        description: "true/false (default true)"
  gdrive_delete_file:
    description: "Permanently delete a file (no trash). Cannot be undone. For soft delete use gdrive_trash_file."
    parameters:
      file_id:
        description: "File ID"
        required: true
      supports_all_drives:
        description: "true/false (default true)"
  gdrive_trash_file:
    description: "Move a file to the trash (soft delete, reversible via gdrive_untrash_file)."
    parameters:
      file_id:
        description: "File ID"
        required: true
      supports_all_drives:
        description: "true/false (default true)"
  gdrive_untrash_file:
    description: "Restore a file from the trash."
    parameters:
      file_id:
        description: "File ID"
        required: true
      supports_all_drives:
        description: "true/false (default true)"
  gdrive_empty_trash:
    description: "Permanently delete all files in the user's trash. Cannot be undone."
    parameters:
      drive_id:
        description: "Shared drive ID (omit to empty My Drive trash)"
  gdrive_create_folder:
    description: "Create a new folder. Convenience wrapper around gdrive_create_file with mime_type set to application/vnd.google-apps.folder."
    parameters:
      name:
        description: "Folder name"
        required: true
      parents:
        description: "Comma-separated parent folder IDs (omit for My Drive root)"
      description:
        description: "Folder description"
      supports_all_drives:
        description: "true/false (default true)"
  gdrive_generate_ids:
    description: "Generate a set of file IDs that can be used in subsequent insert/copy requests. Useful for pre-allocating IDs before uploading."
    parameters:
      count:
        description: "Number of IDs to generate (default 10, max 1000)"
      space:
        description: "Space the IDs are for: drive (default) or appDataFolder"
      type:
        description: "Resource type the IDs are for: files (default) or shortcuts"
  gdrive_list_permissions:
    description: "List the sharing permissions on a file or shared drive. Shows who has access at what role."
    parameters:
      file_id:
        description: "File or shared drive ID"
        required: true
      page_size:
        description: "Max results per page"
      page_token:
        description: "Token for next page"
      supports_all_drives:
        description: "true/false (default true)"
      use_domain_admin_access:
        description: "true/false — issue as domain administrator"
  gdrive_get_permission:
    description: "Get a specific permission entry by ID."
    parameters:
      file_id:
        description: "File or shared drive ID"
        required: true
      permission_id:
        description: "Permission ID"
        required: true
      supports_all_drives:
        description: "true/false (default true)"
  gdrive_create_permission:
    description: "Share a file or folder. Grants a role to a user, group, domain, or anyone. By default sends an email notification."
    parameters:
      file_id:
        description: "File or shared drive ID"
        required: true
      role:
        description: "Role: owner, organizer, fileOrganizer, writer, commenter, reader"
      type:
        description: "Grantee type: user, group, domain, anyone"
      email_address:
        description: "Email (required for user/group)"
      domain:
        description: "Domain (required for type=domain)"
      allow_file_discovery:
        description: "true/false (for type=domain or anyone)"
      send_notification_email:
        description: "true/false (default true for user/group)"
      email_message:
        description: "Custom message to include in the notification email"
      transfer_ownership:
        description: "true/false — required when changing owner"
      move_to_new_owners_root:
        description: "true/false — when transferring ownership in My Drive"
      supports_all_drives:
        description: "true/false (default true)"
      body:
        description: "Raw JSON permission body — overrides convenience args"
  gdrive_update_permission:
    description: "Update a permission's role."
    parameters:
      file_id:
        description: "File or shared drive ID"
        required: true
      permission_id:
        description: "Permission ID"
        required: true
      role:
        description: "New role: owner, organizer, fileOrganizer, writer, commenter, reader"
      expiration_time:
        description: "RFC3339 expiration timestamp"
      transfer_ownership:
        description: "true/false"
      supports_all_drives:
        description: "true/false (default true)"
      body:
        description: "Raw JSON patch body — overrides convenience args"
  gdrive_delete_permission:
    description: "Revoke a permission (unshare)."
    parameters:
      file_id:
        description: "File or shared drive ID"
        required: true
      permission_id:
        description: "Permission ID"
        required: true
      supports_all_drives:
        description: "true/false (default true)"
  gdrive_list_revisions:
    description: "List a file's revision history."
    parameters:
      file_id:
        description: "File ID"
        required: true
      page_size:
        description: "Max results per page"
      page_token:
        description: "Token for next page"
  gdrive_get_revision:
    description: "Get a specific revision's metadata."
    parameters:
      file_id:
        description: "File ID"
        required: true
      revision_id:
        description: "Revision ID"
        required: true
      fields:
        description: "Field selector"
  gdrive_update_revision:
    description: "Update a revision (e.g. keepForever to pin it from auto-cleanup)."
    parameters:
      file_id:
        description: "File ID"
        required: true
      revision_id:
        description: "Revision ID"
        required: true
      keep_forever:
        description: "true/false — pin from auto-cleanup"
      published:
        description: "true/false — publish revision"
      publish_auto:
        description: "true/false — auto-publish subsequent revisions"
      published_outside_domain:
        description: "true/false"
      body:
        description: "Raw JSON patch body — overrides convenience args"
  gdrive_delete_revision:
    description: "Permanently delete a file revision."
    parameters:
      file_id:
        description: "File ID"
        required: true
      revision_id:
        description: "Revision ID"
        required: true
  gdrive_list_comments:
    description: "List comments on a file."
    parameters:
      file_id:
        description: "File ID"
        required: true
      page_size:
        description: "Max results per page"
      page_token:
        description: "Token for next page"
      include_deleted:
        description: "true/false"
      start_modified_time:
        description: "RFC3339 — only comments modified at/after this time"
  gdrive_get_comment:
    description: "Get a comment by ID, including its replies."
    parameters:
      file_id:
        description: "File ID"
        required: true
      comment_id:
        description: "Comment ID"
        required: true
      include_deleted:
        description: "true/false"
  gdrive_create_comment:
    description: "Create a new comment on a file. Optionally anchored to a specific quote/range."
    parameters:
      file_id:
        description: "File ID"
        required: true
      content:
        description: "Comment body (plain text or HTML)"
        required: true
      anchor:
        description: "Anchor JSON string — for anchored comments"
      quoted_file_content:
        description: "JSON object string with mimeType+value the comment quotes"
      body:
        description: "Raw JSON comment body — overrides convenience args"
  gdrive_update_comment:
    description: "Update a comment's content or resolved status."
    parameters:
      file_id:
        description: "File ID"
        required: true
      comment_id:
        description: "Comment ID"
        required: true
      content:
        description: "New content"
      resolved:
        description: "true/false"
      body:
        description: "Raw JSON patch body — overrides convenience args"
  gdrive_delete_comment:
    description: "Delete a comment."
    parameters:
      file_id:
        description: "File ID"
        required: true
      comment_id:
        description: "Comment ID"
        required: true
  gdrive_create_reply:
    description: "Reply to a comment."
    parameters:
      file_id:
        description: "File ID"
        required: true
      comment_id:
        description: "Comment ID"
        required: true
      content:
        description: "Reply content"
        required: true
      action:
        description: "Action: resolve or reopen (optional)"
      body:
        description: "Raw JSON reply body — overrides convenience args"
  gdrive_list_drives:
    description: "List the shared drives the user has access to."
    parameters:
      page_size:
        description: "Max results per page"
      page_token:
        description: "Token for next page"
      q:
        description: "Search query (e.g. \"name contains 'Engineering'\")"
      use_domain_admin_access:
        description: "true/false — list all shared drives in the domain"
  gdrive_get_drive:
    description: "Get metadata for a single shared drive."
    parameters:
      drive_id:
        description: "Shared drive ID"
        required: true
      use_domain_admin_access:
        description: "true/false"
  gdrive_create_drive:
    description: "Create a new shared drive."
    parameters:
      name:
        description: "Shared drive name"
        required: true
      request_id:
        description: "Unique idempotency key (auto-generated if omitted)"
      theme_id:
        description: "Theme ID — for the drive cover image"
  gdrive_update_drive:
    description: "Update a shared drive's metadata (name, theme, restrictions)."
    parameters:
      drive_id:
        description: "Shared drive ID"
        required: true
      name:
        description: "New name"
      theme_id:
        description: "New theme ID"
      body:
        description: "Raw JSON patch body — overrides convenience args (use for restrictions, hidden, etc.)"
      use_domain_admin_access:
        description: "true/false"
  gdrive_delete_drive:
    description: "Delete a shared drive. The drive must be empty."
    parameters:
      drive_id:
        description: "Shared drive ID"
        required: true
      allow_item_deletion:
        description: "true/false — delete non-empty drive (domain admin only)"
      use_domain_admin_access:
        description: "true/false"
  gdrive_hide_drive:
    description: "Hide a shared drive from the user's default view."
    parameters:
      drive_id:
        description: "Shared drive ID"
        required: true
  gdrive_unhide_drive:
    description: "Restore a shared drive to the user's default view."
    parameters:
      drive_id:
        description: "Shared drive ID"
        required: true
  gdrive_get_about:
    description: "Get information about the authenticated user and their Drive (storage quota, supported MIME types, etc.)."
    parameters:
      fields:
        description: "Field selector (default '*'). Example: 'user,storageQuota'"
