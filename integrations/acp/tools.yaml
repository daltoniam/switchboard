version: 1
tools:
  acp_list_agents:
    description: "List available remote agents on ACP servers. Start here to discover AI agents, bots, and autonomous workers before invoking them. Returns agent names, descriptions, and capabilities"
    parameters:
      server:
        description: "Name of a pre-configured ACP server to query. Uses the first configured server if omitted"
      server_url:
        description: "URL of an ACP server to query directly (e.g. http://localhost:8199). Overrides server name lookup"
      server_headers:
        description: 'Optional JSON object of HTTP headers to send with the request (e.g. {"Authorization":"Bearer sk-xxx"})'
  acp_run_agent:
    description: "Invoke a remote ACP agent with a message and get its response. Send a text prompt to an AI agent on a remote server. Use acp_list_agents first to discover available agents. If the agent enters an awaiting state (needs more input), the response includes a run_id — use acp_resume_run to continue"
    parameters:
      agent_name:
        description: "Name of the remote agent to invoke"
        required: true
      input:
        description: "Text message to send to the agent"
        required: true
      server:
        description: "Name of a pre-configured ACP server. Uses the first configured server if omitted"
      server_url:
        description: "URL of an ACP server to connect to directly (e.g. http://localhost:8199). Overrides server name lookup"
      server_headers:
        description: 'Optional JSON object of HTTP headers to send with the request (e.g. {"Authorization":"Bearer sk-xxx"})'
      session_id:
        description: "Session ID for multi-turn conversations with the same agent"
  acp_resume_run:
    description: "Resume an ACP agent run that is waiting for additional input. When acp_run_agent returns a response indicating the agent is awaiting input, use this tool to provide the requested information and continue the run"
    parameters:
      run_id:
        description: "The run_id returned by acp_run_agent when the agent entered awaiting state"
        required: true
      input:
        description: "Text response to provide to the awaiting agent"
        required: true
      server:
        description: "Name of a pre-configured ACP server. Uses the first configured server if omitted"
      server_url:
        description: "URL of an ACP server to connect to directly (e.g. http://localhost:8199). Overrides server name lookup"
      server_headers:
        description: 'Optional JSON object of HTTP headers to send with the request (e.g. {"Authorization":"Bearer sk-xxx"})'
