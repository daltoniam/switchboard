# Switchboard compaction specs for the amazon integration.
#
# Schema: tools.<tool_name>: { spec: [<spec_lines>], max_bytes?: <int> }
#
# The `spec` array is a WHITELIST: only fields whose paths are listed survive
# compaction; everything else is stripped from the response. Within a kept
# parent, use `-field` or `-*_pattern` for explicit exclusions (the only
# blacklist-style escape hatch).
#
# Override at runtime: set $SWITCHBOARD_COMPACT_DIR=/path; place
# amazon.yaml there with only the tools you want to change. Per-tool merge
# replaces embedded values; omitted tools fall through to these defaults.
#
# Full spec syntax (paths, arrays, aliases, exclusions): docs/field-compaction.md.

version: 1
tools:
    amazon_get_cart:
        spec:
            - is_empty
            - subtotal
            - total_items
            - items[].title
            - items[].price
            - items[].quantity
            - items[].asin
            - items[].availability
    amazon_get_orders:
        spec:
            - order_info.order_number
            - order_info.order_date
            - order_info.total
            - order_info.status
            - items[].title
            - items[].asin
            - items[].return_eligible
    amazon_get_product:
        spec:
            - asin
            - title
            - price
            - can_use_subscribe_and_save
            - description.overview
            - description.features
            - reviews.average_rating
            - reviews.reviews_count
            - main_image_url
    amazon_search_products:
        spec:
            - asin
            - title
            - is_sponsored
            - brand
            - price
            - reviews.average_rating
            - reviews.review_count
            - is_prime_eligible
            - product_url
