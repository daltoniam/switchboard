# Switchboard compaction specs for the ynab integration.
#
# Schema: tools.<tool_name>: { spec: [<spec_lines>], max_bytes?: <int> }
#
# The `spec` array is a WHITELIST: only fields whose paths are listed survive
# compaction; everything else is stripped from the response. Within a kept
# parent, use `-field` or `-*_pattern` for explicit exclusions (the only
# blacklist-style escape hatch).
#
# Override at runtime: set $SWITCHBOARD_COMPACT_DIR=/path; place
# ynab.yaml there with only the tools you want to change. Per-tool merge
# replaces embedded values; omitted tools fall through to these defaults.
#
# Full spec syntax (paths, arrays, aliases, exclusions): docs/field-compaction.md.

version: 1
tools:
    ynab_list_account_transactions:
        spec:
            - data.transactions[].id
            - data.transactions[].date
            - data.transactions[].amount
            - data.transactions[].memo
            - data.transactions[].cleared
            - data.transactions[].approved
            - data.transactions[].payee_id
            - data.transactions[].payee_name
            - data.transactions[].category_id
            - data.transactions[].category_name
            - data.transactions[].flag_color
            - data.transactions[].deleted
    ynab_list_accounts:
