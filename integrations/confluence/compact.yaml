# Switchboard compaction specs for the confluence integration.
#
# Schema: tools.<tool_name>: { spec: [<spec_lines>], max_bytes?: <int> }
#
# The `spec` array is a WHITELIST: only fields whose paths are listed survive
# compaction; everything else is stripped from the response. Within a kept
# parent, use `-field` or `-*_pattern` for explicit exclusions (the only
# blacklist-style escape hatch).
#
# Override at runtime: set $SWITCHBOARD_COMPACT_DIR=/path; place
# confluence.yaml there with only the tools you want to change. Per-tool merge
# replaces embedded values; omitted tools fall through to these defaults.
#
# Full spec syntax (paths, arrays, aliases, exclusions): docs/field-compaction.md.

version: 1
tools:
    confluence_get_blog_post:
        spec:
            - id
            - title
            - status
            - spaceId
            - authorId
            - createdAt
            - version.number
            - version.createdAt
            - body.storage.value
            - _links.webui
    confluence_get_page:
        spec:
            - id
            - title
            - status
            - spaceId
            - authorId
            - createdAt
            - version.number
            - version.createdAt
            - body.storage.value
            - parentId
            - parentType
            - _links.webui
    confluence_get_page_children:
        spec:
            - results[].id
            - results[].title
            - results[].status
            - results[].spaceId
            - results[].authorId
            - results[].createdAt
            - results[].version.number
    confluence_get_space:
        spec:
            - id
            - key
            - name
            - type
            - status
            - description
            - homepageId
    confluence_list_blog_posts:
        spec:
            - results[].id
            - results[].title
            - results[].status
            - results[].spaceId
            - results[].authorId
            - results[].createdAt
            - results[].version.number
    confluence_list_comments:
        spec:
            - results[].id
            - results[].status
            - results[].authorId
            - results[].createdAt
            - results[].version.number
            - results[].body.storage.value
    confluence_list_pages:
        spec:
            - results[].id
            - results[].title
            - results[].status
            - results[].spaceId
            - results[].authorId
            - results[].createdAt
            - results[].version.number
    confluence_list_spaces:
        spec:
            - results[].id
            - results[].key
            - results[].name
            - results[].type
            - results[].status
    confluence_search:
        spec:
            - results[].content.id
            - results[].content.type
            - results[].content.title
            - results[].content.status
            - results[].content._links.webui
            - results[].excerpt
            - results[].url
