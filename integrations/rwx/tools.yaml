version: 1
tools:
  rwx_launch_ci_run:
    description: "Launch a CI/CD pipeline run using the rwx CLI. Start here to run CI. Executes the specified workflow file (default: .rwx/ci.yml)."
    parameters:
      workflow:
        description: "Path to the RWX workflow YAML file to run (default: .rwx/ci.yml, e.g. .rwx/auto-deploy.yml)"
      targets:
        description: "JSON array of specific task keys to target (optional)"
      wait:
        description: "Wait for the run to complete before returning (true/false, default: false)"
      title:
        description: "Display title for the run in the RWX UI (optional)"
      init:
        description: 'JSON object of init parameters available in the init context (optional, e.g. {"deploy_env": "staging"})'
  rwx_dispatch_run:
    description: "Launch a run from a pre-configured RWX dispatch workflow by key. Use instead of rwx_launch_ci_run when triggering remote/pre-configured workflows without local files."
    parameters:
      dispatch_key:
        description: "The dispatch key identifying the pre-configured workflow"
        required: true
      ref:
        description: "Git ref (branch/tag/SHA) to use for the run (optional)"
      params:
        description: "JSON object of dispatch params available in event.dispatch.params context (optional)"
      wait:
        description: "Wait for the run to complete before returning (true/false, default: false)"
      title:
        description: "Display title for the run in the RWX UI (optional)"
  rwx_wait_for_ci_run:
    description: "Poll and wait for an RWX CI run to complete or timeout"
    parameters:
      run_id:
        description: "RWX run ID or full URL to wait for"
        required: true
      timeout_seconds:
        description: "Maximum time to wait in seconds (default: 1800)"
      poll_interval_seconds:
        description: "Seconds between status checks (default: 30)"
  rwx_get_recent_runs:
    description: "Get recent CI/CD runs for a git branch. Returns all workflow runs by default; use definition_path to filter to a specific workflow."
    parameters:
      ref:
        description: "Git ref (branch name) to filter runs by"
        required: true
      limit:
        description: "Number of runs to return (default: 5)"
      definition_path:
        description: "Filter to a specific workflow file (e.g. .rwx/ci.yml, .rwx/auto-deploy.yml). Omit to return all workflows."
  rwx_get_run_results:
    description: "Get structured CI/CD pipeline results including per-task pass/fail status, failed tests, and build errors. Accepts a run ID or branch/commit lookup."
    parameters:
      run_id:
        description: "RWX run ID or full URL (required unless branch is provided)"
      task_key:
        description: "Get results for a specific task by key (e.g. ci.checks.lint) instead of the full run"
      branch:
        description: "Look up results by branch name instead of run ID (uses current repo unless repo is set)"
      commit:
        description: "Look up results by commit SHA instead of run ID"
      repo:
        description: "Repository name for branch/commit lookup (default: current git repo)"
      definition:
        description: "Definition path for branch/commit lookup (e.g. .rwx/ci.yml)"
  rwx_get_task_logs:
    description: "Download and return full CI/CD task logs with build failure and test failure highlights"
    parameters:
      task_id:
        description: "RWX task ID (32-char hex) or task URL"
      run_id:
        description: "RWX run ID — use with task_key to resolve by key instead of ID (optional)"
      task_key:
        description: "Task key (e.g. ci.checks.lint) — requires run_id. Use instead of task_id."
  rwx_head_logs:
    description: "Return the first N lines of logs for a run or task. Supports pagination via offset."
    parameters:
      id:
        description: "RWX run ID or task ID"
        required: true
      lines:
        description: "Number of lines to return from the beginning (default: 50, max: 50)"
      offset:
        description: "Line offset to start from (default: 0). Use for pagination."
      task_key:
        description: "Task key (e.g. ci.checks.lint) — when set, id is treated as run ID and task is resolved by key"
  rwx_tail_logs:
    description: "Return the last N lines of logs for a run or task. Supports pagination via offset."
    parameters:
      id:
        description: "RWX run ID or task ID"
        required: true
      lines:
        description: "Number of lines to return from the end (default: 50, max: 50)"
      offset:
        description: "Line offset from the end (default: 0). Use for pagination to see earlier lines."
      task_key:
        description: "Task key (e.g. ci.checks.lint) — when set, id is treated as run ID and task is resolved by key"
  rwx_grep_logs:
    description: "Search CI/CD build and test logs for a pattern with context lines. Results are paginated (50 lines per page)."
    parameters:
      id:
        description: "RWX run ID or task ID"
        required: true
      pattern:
        description: "Pattern to search for in the logs (case-insensitive)"
        required: true
      context:
        description: "Number of context lines before and after matches (default: 3)"
      page:
        description: "Page number (default: 1). Each page returns up to 50 lines of output."
      task_key:
        description: "Task key (e.g. ci.checks.lint) — when set, id is treated as run ID and task is resolved by key"
  rwx_get_artifacts:
    description: "List or download artifacts for a run"
    parameters:
      run_id:
        description: "RWX run ID or full URL to get artifacts for"
        required: true
      download:
        description: "Download artifacts (true/false, default: false — just list)"
      artifact_key:
        description: "Specific artifact key to download (optional, downloads all if not specified)"
  rwx_validate_workflow:
    description: "Validate an RWX workflow YAML file using the rwx CLI"
    parameters:
      file_path:
        description: "Path to the RWX workflow YAML file to validate (default: .rwx/ci.yml)"
  rwx_docs_search:
    description: "Search RWX documentation. Use to find docs on caching, parallelism, configuration, and other RWX features."
    parameters:
      query:
        description: "Search query (e.g. 'caching', 'parallelism', 'filtering files')"
        required: true
      limit:
        description: "Maximum number of results (default: 5)"
  rwx_docs_pull:
    description: "Fetch an RWX documentation article as markdown. Use a URL from rwx_docs_search results or a docs path like /docs/caching."
    parameters:
      url_or_path:
        description: "Full URL (https://www.rwx.com/docs/...) or path (/docs/caching) of the article to fetch"
        required: true
  rwx_vaults_var_show:
    description: "Show a variable value from an RWX vault"
    parameters:
      name:
        description: "Variable name to show"
        required: true
      vault:
        description: "Vault name (default: 'default')"
  rwx_vaults_var_set:
    description: "Set a variable in an RWX vault"
    parameters:
      name:
        description: "Variable name"
        required: true
      value:
        description: "Variable value"
        required: true
      vault:
        description: "Vault name (default: 'default')"
  rwx_vaults_var_delete:
    description: "Delete a variable from an RWX vault"
    parameters:
      name:
        description: "Variable name to delete"
        required: true
      vault:
        description: "Vault name (default: 'default')"
  rwx_vaults_secret_set:
    description: "Set a secret in an RWX vault. The value is stored encrypted and cannot be read back."
    parameters:
      name:
        description: "Secret name"
        required: true
      value:
        description: "Secret value"
        required: true
      vault:
        description: "Vault name (default: 'default')"
  rwx_vaults_secret_delete:
    description: "Delete a secret from an RWX vault"
    parameters:
      name:
        description: "Secret name to delete"
        required: true
      vault:
        description: "Vault name (default: 'default')"
  rwx_verify_cli:
    description: "Verify the rwx CLI is installed and meets the minimum version requirement (>= 3.13.0)"
    parameters: {}
