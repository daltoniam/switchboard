version: 1
tools:
  github_search_repos:
    description: "Search GitHub repositories. Start here to find repos by name, topic, or language."
    parameters:
      query:
        description: "Search query"
        required: true
      page:
        description: "Page number"
      per_page:
        description: "Results per page"
  github_get_repo:
    description: "Get a repository by owner/name. Use after search_repos or when you already know the owner/repo."
    parameters:
      owner:
        description: "Repository owner"
        required: true
      repo:
        description: "Repository name"
        required: true
  github_list_user_repos:
    description: "List repositories for a user. Use when you know the username; prefer search_repos for keyword discovery."
    parameters:
      username:
        description: "GitHub username"
        required: true
      type:
        description: "Type: all, owner, member (default: owner)"
      sort:
        description: "Sort: created, updated, pushed, full_name"
      page:
        description: "Page number"
      per_page:
        description: "Results per page"
  github_list_org_repos:
    description: "List repositories for an organization. Use when you know the org; prefer search_repos for keyword discovery."
    parameters:
      org:
        description: "Organization name"
        required: true
      type:
        description: "Type: all, public, private, forks, sources, member"
      sort:
        description: "Sort: created, updated, pushed, full_name"
      page:
        description: "Page number"
      per_page:
        description: "Results per page"
  github_create_repo:
    description: "Create a repository for the authenticated user or an org"
    parameters:
      name:
        description: "Repository name"
        required: true
      org:
        description: "Organization (omit for user repo)"
      description:
        description: "Description"
      private:
        description: "Private repo (true/false)"
      auto_init:
        description: "Initialize with README (true/false)"
  github_delete_repo:
    description: "Delete a repository"
    parameters:
      owner:
        description: "Repository owner"
        required: true
      repo:
        description: "Repository name"
        required: true
  github_list_branches:
    description: "List branches of a repository"
    parameters:
      owner:
        description: "Repository owner"
        required: true
      repo:
        description: "Repository name"
        required: true
      page:
        description: "Page number"
      per_page:
        description: "Results per page"
  github_get_branch:
    description: "Get a specific branch"
    parameters:
      owner:
        description: "Repository owner"
        required: true
      repo:
        description: "Repository name"
        required: true
      branch:
        description: "Branch name"
        required: true
  github_list_tags:
    description: "List tags of a repository"
    parameters:
      owner:
        description: "Repository owner"
        required: true
      repo:
        description: "Repository name"
        required: true
      page:
        description: "Page number"
      per_page:
        description: "Results per page"
  github_list_contributors:
    description: "List contributors to a repository"
    parameters:
      owner:
        description: "Repository owner"
        required: true
      repo:
        description: "Repository name"
        required: true
      page:
        description: "Page number"
      per_page:
        description: "Results per page"
  github_list_languages:
    description: "List languages used in a repository"
    parameters:
      owner:
        description: "Repository owner"
        required: true
      repo:
        description: "Repository name"
        required: true
  github_list_topics:
