    parameters:
      owner:
        description: "Repository owner"
        required: true
      repo:
        description: "Repository name"
        required: true
  github_get_readme:
    description: "Get the README for a repository"
    parameters:
      owner:
        description: "Repository owner"
        required: true
      repo:
        description: "Repository name"
        required: true
      ref:
        description: "Git ref (branch/tag/sha)"
