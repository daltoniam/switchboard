version: 1
tools:
  gsheets_get_spreadsheet:
    description: "Retrieve (get) a Google Sheets spreadsheet by ID, including its sheet tabs, their properties (titles, grid sizes, hidden state, tab colors), and optional cell data. Start here when you need to discover what sheets/tabs exist, get sheetIds for batchUpdate, or fetch metadata. For raw cell values, use gsheets_get_values (faster and lighter). Set include_grid_data=true to embed cell data — only do this for small sheets, the response can be enormous."
    parameters:
      spreadsheet_id:
        description: "The Google Sheets spreadsheet ID (the long string in the spreadsheet URL between /d/ and /edit)"
        required: true
      ranges:
        description: "Optional comma-separated A1-notation ranges to limit the response to (e.g. 'Sheet1!A1:C10,Sheet2!A:B')"
      include_grid_data:
        description: "true/false — embed full cell grid data in the response (default false; can be huge)"
      fields:
        description: "Optional partial-response field mask (e.g. 'sheets.properties,spreadsheetId') to trim the response"
  gsheets_create_spreadsheet:
    description: "Create a new Google Sheets spreadsheet. Returns the new spreadsheet including its ID, which you can pass to gsheets_update_values or gsheets_batch_update to add content. To save the spreadsheet into a specific Drive folder, use gdrive_update_file afterward to set parents."
    parameters:
      title:
        description: "Spreadsheet title (defaults to 'Untitled spreadsheet')"
      sheet_titles:
        description: "Optional comma-separated list of initial sheet/tab titles (e.g. 'Summary,Data,Notes'). Default is one sheet named 'Sheet1'."
  gsheets_get_values:
    description: "Read cell values from a Google Sheets range using A1 notation. The lightest-weight way to extract data — far smaller than gsheets_get_spreadsheet with grid data. Returns a 2-D array of cell values. Use 'Sheet1' or 'Sheet1!A1:D100'-style ranges. Empty trailing cells are omitted, so each row may have fewer columns than the header row."
    parameters:
      spreadsheet_id:
        description: "The spreadsheet ID"
        required: true
      range:
        description: "A1-notation range (e.g. 'Sheet1!A1:D100', 'Data', 'Summary!A:C')"
        required: true
      value_render_option:
        description: "How values are returned: FORMATTED_VALUE (default; what's shown in the UI), UNFORMATTED_VALUE (raw values), or FORMULA (cell formulas)"
      date_time_render_option:
        description: "How dates/times are returned: SERIAL_NUMBER (default) or FORMATTED_STRING"
      major_dimension:
        description: "ROWS (default) or COLUMNS — controls whether the outer array is rows or columns"
  gsheets_batch_get_values:
    description: "Read cell values from multiple A1 ranges in one Google Sheets request. Use when you need to pull values from several non-contiguous ranges (e.g. 'Summary!A1:B5' and 'Data!D1:D100') — much faster than multiple gsheets_get_values calls."
    parameters:
      spreadsheet_id:
        description: "The spreadsheet ID"
        required: true
      ranges:
        description: "Comma-separated A1-notation ranges (e.g. 'Sheet1!A1:B5,Sheet2!C:C')"
        required: true
      value_render_option:
        description: "FORMATTED_VALUE (default), UNFORMATTED_VALUE, or FORMULA"
      date_time_render_option:
        description: "SERIAL_NUMBER (default) or FORMATTED_STRING"
      major_dimension:
        description: "ROWS (default) or COLUMNS"
  gsheets_update_values:
    description: "Overwrite cell values in a Google Sheets range. The values array must match the range shape; cells in the range that aren't present in values are NOT cleared. Pass values as a JSON-encoded 2-D array (rows of columns). For inserting at the bottom of a table, prefer gsheets_append_values."
    parameters:
      spreadsheet_id:
        description: "The spreadsheet ID"
        required: true
      range:
        description: "A1-notation range to write to (e.g. 'Sheet1!A2:C2')"
        required: true
      values:
        description: "JSON 2-D array of values (e.g. '[[\"a\",\"b\",\"c\"],[1,2,3]]') — strings, numbers, booleans, or null"
        required: true
      value_input_option:
        description: "USER_ENTERED (default — parse like a user typed: formulas evaluate, dates parse) or RAW (store the input verbatim)"
      major_dimension:
        description: "ROWS (default) or COLUMNS"
      include_values_in_response:
        description: "true/false — return the updated values in the response (default false)"
  gsheets_append_values:
    description: "Append rows to the end of a Google Sheets table. Finds the first empty row at or below the given range and inserts there. Use this for log-style or transactional data where you want new rows added without overwriting. Returns the actual range that was updated."
    parameters:
      spreadsheet_id:
        description: "The spreadsheet ID"
        required: true
      range:
        description: "A1-notation range identifying the table (e.g. 'Sheet1' or 'Sheet1!A1') — Sheets searches downward from the top-left of this range for the next empty row."
        required: true
      values:
        description: "JSON 2-D array of values (e.g. '[[\"new\",\"row\"]]')"
        required: true
      value_input_option:
        description: "USER_ENTERED (default) or RAW"
      insert_data_option:
        description: "OVERWRITE (default — write into existing cells if the table extends) or INSERT_ROWS (shift rows down)"
      major_dimension:
        description: "ROWS (default) or COLUMNS"
      include_values_in_response:
        description: "true/false — return the appended values (default false)"
  gsheets_clear_values:
    description: "Clear the cell values in a Google Sheets range, leaving formatting and other properties intact. Use a full range like 'Sheet1!A:Z' to wipe all data on a tab. To also remove formatting/banding, use gsheets_batch_update with a 'updateCells' request and the relevant field mask."
    parameters:
      spreadsheet_id:
        description: "The spreadsheet ID"
        required: true
      range:
        description: "A1-notation range to clear (e.g. 'Sheet1!A2:Z')"
        required: true
  gsheets_batch_update_values:
    description: "Update cell values for multiple A1 ranges in one Google Sheets request — a single atomic write covering many ranges. Pass 'data' as a JSON array of {range, values, major_dimension?} objects. Much faster than multiple gsheets_update_values calls."
    parameters:
      spreadsheet_id:
        description: "The spreadsheet ID"
        required: true
      data:
        description: "JSON array of ValueRange objects (e.g. '[{\"range\":\"Sheet1!A1:B1\",\"values\":[[\"a\",\"b\"]]},{\"range\":\"Sheet2!A1\",\"values\":[[\"hello\"]]}]'). Each entry may include majorDimension."
        required: true
      value_input_option:
        description: "USER_ENTERED (default) or RAW"
      include_values_in_response:
        description: "true/false — return updated values (default false)"
  gsheets_batch_update:
    description: "Apply a batch of structural edit requests to a Google Sheets spreadsheet — the full power of the Sheets API. Use for adding/deleting/renaming sheets, formatting cells, inserting columns, freezing panes, conditional formatting, charts, banding, protected ranges, named ranges, and so on. For pure value writes, use gsheets_update_values, gsheets_append_values, or gsheets_batch_update_values instead — those are simpler and don't need sheetIds."
    parameters:
      spreadsheet_id:
        description: "The spreadsheet ID"
        required: true
      requests:
        description: 'JSON array of Sheets API Request objects (e.g. [{"addSheet":{"properties":{"title":"NewTab"}}}])'
        required: true
      include_spreadsheet_in_response:
        description: "true/false — include the full spreadsheet in the response (default false)"
      response_include_grid_data:
        description: "true/false — include grid data if the spreadsheet is in the response (default false)"
      response_ranges:
        description: "Optional comma-separated A1-notation ranges to limit the spreadsheet response to"
