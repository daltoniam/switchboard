# Switchboard compaction specs for the signoz integration.
#
# Schema: tools.<tool_name>: { spec: [<spec_lines>], max_bytes?: <int> }
#
# The `spec` array is a WHITELIST: only fields whose paths are listed survive
# compaction; everything else is stripped from the response. Within a kept
# parent, use `-field` or `-*_pattern` for explicit exclusions (the only
# blacklist-style escape hatch).
#
# Override at runtime: set $SWITCHBOARD_COMPACT_DIR=/path; place
# signoz.yaml there with only the tools you want to change. Per-tool merge
# replaces embedded values; omitted tools fall through to these defaults.
#
# Full spec syntax (paths, arrays, aliases, exclusions): docs/field-compaction.md.

version: 1
tools:
    signoz_entry_point_operations:
        spec:
            - name
            - serviceName
            - numCalls
    signoz_get_alert:
        spec:
            - id
            - state
            - alert
            - alertType
            - condition
            - labels
            - annotations
            - evalTime
    signoz_get_dashboard:
        spec:
            - id
            - data.data.title
            - data.data.description
            - data.data.tags
            - data.data.layout
            - data.data.widgets[].id
            - data.data.widgets[].title
            - data.data.widgets[].panelTypes
            - createdAt
    signoz_get_saved_view:
        spec:
            - uuid
            - name
            - category
            - compositeQuery
            - createdAt
            - updatedAt
    signoz_get_service_overview:
        spec:
            - result[].queryName
            - result[].series[].labels
            - result[].series[].values
    signoz_get_trace:
        spec:
            - columns
            - events[].SpanId
            - events[].TraceId
            - events[].ServiceName
            - events[].Name
            - events[].DurationNano
            - events[].HasError
            - events[].StatusCodeString
    signoz_get_version:
        spec:
            - version
            - ee
            - setupCompleted
    signoz_list_alerts:
        spec:
            - rules[].id
            - rules[].state
            - rules[].alert
            - rules[].alertType
            - rules[].labels
            - rules[].evalTime
    signoz_list_channels:
        spec:
            - id
            - name
            - type
            - createdAt
    signoz_list_dashboards:
        spec:
            - id
            - data.data.title
            - data.data.description
            - data.data.tags
            - createdAt
            - updatedAt
    signoz_list_saved_views:
        spec:
            - uuid
            - name
            - category
            - createdAt
            - updatedAt
    signoz_list_services:
        spec:
            - serviceName
            - p99
            - avgDuration
            - numCalls
            - callRate
            - numErrors
            - errorRate
    signoz_query_metrics:
        spec:
            - result[].queryName
            - result[].series[].labels
            - result[].series[].values
    signoz_search_logs:
        spec:
            - result[].queryName
            - result[].list[].timestamp
            - result[].list[].data.severity_text
            - result[].list[].data.body
            - result[].list[].data.resources_string
    signoz_search_traces:
        spec:
            - result[].queryName
            - result[].list[].timestamp
            - result[].list[].data.traceID
            - result[].list[].data.spanID
            - result[].list[].data.serviceName
            - result[].list[].data.name
            - result[].list[].data.durationNano
            - result[].list[].data.hasError
    signoz_top_level_operations:
        spec:
            - name
            - serviceName
            - numCalls
    signoz_top_operations:
        spec:
            - name
            - p50
            - p90
            - p99
            - numCalls
            - errorRate
