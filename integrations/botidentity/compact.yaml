# Switchboard compaction specs for the botidentity integration.
#
# Schema: tools.<tool_name>: { spec: [<spec_lines>], max_bytes?: <int> }
#
# The `spec` array is a WHITELIST: only fields whose paths are listed survive
# compaction; everything else is stripped from the response. Within a kept
# parent, use `-field` or `-*_pattern` for explicit exclusions (the only
# blacklist-style escape hatch).
#
# Override at runtime: set $SWITCHBOARD_COMPACT_DIR=/path; place
# botidentity.yaml there with only the tools you want to change. Per-tool merge
# replaces embedded values; omitted tools fall through to these defaults.
#
# Full spec syntax (paths, arrays, aliases, exclusions): docs/field-compaction.md.

version: 1
tools:
    botidentity_gh_list_install_repos:
        spec:
            - repositories[].id
            - repositories[].name
            - repositories[].full_name
            - repositories[].private
            - repositories[].html_url
    botidentity_gh_list_installations:
        spec:
            - id
            - app_id
            - app_slug
            - target_type
            - target_id
            - account.login
            - account.id
            - account.type
            - permissions
            - events
            - suspended_at
            - created_at
            - updated_at
    botidentity_gh_list_webhook_deliveries:
        spec:
            - id
            - guid
            - event
            - action
            - status
            - status_code
            - delivered_at
