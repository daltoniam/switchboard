# Switchboard compaction specs for the clickhouse integration.
#
# Schema: tools.<tool_name>: { spec: [<spec_lines>], max_bytes?: <int> }
#
# The `spec` array is a WHITELIST: only fields whose paths are listed survive
# compaction; everything else is stripped from the response. Within a kept
# parent, use `-field` or `-*_pattern` for explicit exclusions (the only
# blacklist-style escape hatch).
#
# Override at runtime: set $SWITCHBOARD_COMPACT_DIR=/path; place
# clickhouse.yaml there with only the tools you want to change. Per-tool merge
# replaces embedded values; omitted tools fall through to these defaults.
#
# Full spec syntax (paths, arrays, aliases, exclusions): docs/field-compaction.md.

version: 1
tools:
    clickhouse_describe_table:
        spec:
            - name
            - type
            - default_kind
            - default_expression
            - comment
    clickhouse_disk_usage:
        spec:
            - database
            - total_bytes
            - total_rows
            - part_count
    clickhouse_list_columns:
        spec:
            - name
            - type
            - default_kind
            - default_expression
            - comment
            - is_in_partition_key
            - is_in_sorting_key
    clickhouse_list_databases:
        spec:
            - name
            - engine
            - data_path
    clickhouse_list_dictionaries:
        spec:
            - name
            - type
            - status
            - element_count
            - bytes_allocated
    clickhouse_list_merges:
        spec:
            - database
            - table
            - elapsed
            - progress
            - total_size_bytes_compressed
    clickhouse_list_parts:
        spec:
            - name
            - partition
            - rows
            - bytes_on_disk
            - modification_time
            - active
    clickhouse_list_processes:
        spec:
            - query_id
            - user
            - query
            - elapsed
            - read_rows
            - memory_usage
    clickhouse_list_replicas:
        spec:
            - database
            - table
            - is_leader
            - total_replicas
            - active_replicas
            - queue_size
    clickhouse_list_roles:
        spec:
            - name
    clickhouse_list_settings:
        spec:
            - name
            - value
            - changed
            - description
    clickhouse_list_tables:
        spec:
            - name
            - engine
            - total_rows
            - total_bytes
    clickhouse_list_users:
        spec:
            - name
            - storage
            - auth_type
    clickhouse_query_log:
        spec:
            - query_id
            - type
            - user
            - query
            - query_duration_ms
            - read_rows
            - memory_usage
            - event_time
    clickhouse_server_info:
        spec:
            - version
            - uptime
            - os_user
            - hostname
    clickhouse_show_create_table:
        spec:
            - statement
